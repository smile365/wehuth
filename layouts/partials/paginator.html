<div class="pagination">
    {{ if .Paginator.HasPrev }}
    <a class="button is-rounded" href="{{ .Paginator.Prev.URL }}">{{ default "← 上一页" (i18n "prev_page") }}</a>
    {{ end }}
    <span class="pagination-info">{{ .Paginator.PageNumber }} / {{ .Paginator.TotalPages }}</span>
    {{ if .Paginator.HasNext }}
    <a class="button is-rounded" href="{{ .Paginator.Next.URL }}">{{ default "下一页 →" (i18n "next_page") }}</a>
    {{ end }}
</div>
