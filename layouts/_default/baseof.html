<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  {{ partial "head.html" . }}
  <body class="{{ if .IsPage }}page{{ else if .IsHome }}home{{ else }}list{{ end }}">
    <div class="wrapper">
        {{ if not .IsPage }}
          {{ partial "header" . }}
        {{ end }}
        <main class="main" role="main">
          <div class="container" id="content">
            {{ block "content" . }}{{ end }}
          </div>
        </main>
      {{ partial "footer.html" . }}
     </div>
  </body>
</html>
