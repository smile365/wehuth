<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  {{ partial "head.html" . }}
  <body class="{{ if .IsPage }}page{{ else if .IsHome }}home{{ else }}list{{ end }}">
    <div class="wrapper">
        {{ if not .IsPage }}
          {{ partial "header" . }}
        {{ end }}
        <main class="main" role="main">
          <div class="container" id="content">
            {{ block "content" . }}{{ end }}
          </div>
        </main>
      {{ partial "footer.html" . }}
     </div>
     <script>
     (function() {
       var links = document.querySelectorAll('a');
       var baseUrl = '{{ .Site.BaseURL }}';
       for (var i = 0; i < links.length; i++) {
         var href = links[i].getAttribute('href');
         if (href && !href.startsWith(baseUrl) && !href.startsWith('/') && !href.startsWith('#') && !href.startsWith('?')) {
           links[i].setAttribute('target', '_blank');
           links[i].setAttribute('rel', 'noopener noreferrer');
         }
       }
     })();
     </script>
  </body>
</html>
