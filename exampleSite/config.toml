baseURL = "https://example.com/"
languageCode = "zh"
title = "宋洋葱的博客"
theme = "wehuth"

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "ADS"]

[outputFormats]
  [outputFormats.ADS]
    name = "ADS"
    path = "/"
    mediaType = "text/plain"
    baseName = "ads"
    isPlainText = true

hasCJKLanguage = true
watch = true

[menu]
  [[menu.main]]
    name = "生活"
    url = "/categories/life"
    weight = 1

  [[menu.main]]
    name = "技术"
    url = "/categories/code"
    weight = 3

  [[menu.main]]
    name = "读书"
    url = "/categories/read"
    weight = 5

  [[menu.main]]
    name = "工具"
    url = "/categories/tools"
    weight = 7

[params]
  home_path = "/categories/life"
  author = "宋洋葱"
  aboutme = "https://github.com/smile365"
  subtitle = "若你欲哭无泪，我送你一颗洋葱啊"
  description = "研究互联网产品和技术，提供原创中文精品教程"
  keywords = "javascript,html,jquery,git,python,java,css,linux,blog"

  # 第三方服务 (设为空或不设置则不启用)
  adsense_publisher_id = "4662105987705607"       # Google AdSense publisher ID (不含 pub-)
  # baidu_analytics = "d1336a401125408e2b0cc8a38bcbf17a"  # 百度统计 HM ID
  # ga4 = "G-XXXXXXXXXX"                          # Google Analytics 4 Measurement ID

  # Valine 评论 (设为空或不设置则不启用)
  # valine_appId = "your-valine-appId"
  # valine_appKey = "your-valine-appKey"

  # 功能开关
  # enableToc = true          # 文章目录 (默认开启)
  # enableReadingTime = true  # 阅读时间 (默认开启)

  # OG/Twitter 卡片默认图片
  # [params.image]
  #   url = "https://example.com/images/og.png"

  # Twitter 账号 (用于 Twitter Card)
  # twitter = "@smile365"
  # twitterCreator = "@smile365"

  # 相关文章最多显示数量 (默认 5)
  # relatedMaxCount = 5

  # Copyright
  license = 'Released under <a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  # 社交链接
  github = "https://github.com/smile365"
  wechat = "https://github.com/smile365"
  zhihu = "https://www.zhihu.com/people/sxy91"



[related]

  [[related.indices]]
  name = "tags"
  weight = 100

  [[related.indices]]
  name = "title"
  weight = 90

  [[related.indices]]
  name = "keywords"
  weight = 80


